# Mooncell Console 服务配置

[server]
addr = "0.0.0.0"   # 监听地址,127.0.0.1 仅本机
port = 8787

[database]
path = "mooncell.db"   # sqlite 文件路径,首次运行自动创建

[session]
ttl_hours = 168   # 会话有效期(小时),168 = 7 天

[admin]
# 仅在用户表为空时用于种入默认管理员(bcrypt 存储);
# 库已存在用户后修改此处不会改动已有账号。
username = "admin"
password = "jch@9388"

[agent]
# Console 主动连接的 Agent;单机版默认指向本机 Agent。
# token 须与 Agent 端 config.toml 的 [security] token 一致。
addr  = "127.0.0.1:9100"
token = "mc_ag_change_me"

[deploy]
# 部署制品上传的传输层硬上限(MB)。超出在传输层截断并回 413,防超大制品撑爆磁盘。
# 大 war/dist 仍建议走分块上传(待实现);默认 1024MB。
max_upload_mb = 1024
