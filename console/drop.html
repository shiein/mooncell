<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Mooncell · 文件投递</title>
<style>
  :root {
    --bg: #0f1115; --card: #171a21; --line: #262b35; --fg: #e6e8ec;
    --muted: #8b919d; --primary: #5b8cff; --primary-d: #4778ec;
    --ok: #34c77b; --err: #ff5d5d; --soft: #1d212a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    padding: 48px 16px;
  }
  .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  .wrap { width: 100%; max-width: 460px; }
  header { text-align: center; margin-bottom: 26px; }
  header .logo { font-size: 20px; font-weight: 700; letter-spacing: .5px; }
  header .sub { color: var(--muted); font-size: 13px; margin-top: 6px; }
  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: 14px;
    padding: 20px; margin-bottom: 16px;
  }
  .card h2 { font-size: 14px; margin: 0 0 14px; font-weight: 600; }
  .zone {
    border: 1.5px dashed var(--line); border-radius: 12px; padding: 26px 16px;
    text-align: center; cursor: pointer; transition: .15s; background: var(--soft);
  }
  .zone:hover, .zone.drag { border-color: var(--primary); background: #1b2230; }
  .zone .ic { font-size: 26px; }
  .zone .t { font-weight: 600; font-size: 14px; margin-top: 8px; }
  .zone .h { color: var(--muted); font-size: 12px; margin-top: 4px; }
  .zone .fname { color: var(--primary); font-size: 13px; margin-top: 8px; word-break: break-all; }
  .row { display: flex; align-items: center; gap: 10px; margin-top: 14px; }
  label.fl { font-size: 13px; color: var(--muted); flex: none; }
  select, input {
    background: var(--soft); border: 1px solid var(--line); color: var(--fg);
    border-radius: 9px; padding: 9px 11px; font-size: 13.5px; width: 100%; outline: none;
  }
  select:focus, input:focus { border-color: var(--primary); }
  input.mono { letter-spacing: .18em; text-transform: uppercase; }
  button {
    background: var(--primary); color: #fff; border: 0; border-radius: 9px;
    padding: 10px 16px; font-size: 13.5px; font-weight: 600; cursor: pointer; transition: .15s;
    white-space: nowrap;
  }
  button:hover { background: var(--primary-d); }
  button:disabled { opacity: .5; cursor: not-allowed; }
  button.full { width: 100%; margin-top: 14px; }
  .bar { height: 6px; background: var(--soft); border-radius: 4px; overflow: hidden; margin-top: 14px; }
  .bar > i { display: block; height: 100%; background: var(--primary); width: 0; transition: width .2s; }
  .res {
    margin-top: 14px; background: var(--soft); border: 1px solid var(--line);
    border-radius: 10px; padding: 14px;
  }
  .res .k { color: var(--muted); font-size: 12px; }
  .res .code {
    font-size: 26px; font-weight: 700; letter-spacing: .22em; color: var(--ok);
    margin: 4px 0 10px; text-align: center;
  }
  .res .link { display: flex; gap: 8px; align-items: center; }
  .res .link input { font-size: 12px; }
  .copy { background: var(--soft); border: 1px solid var(--line); color: var(--fg); padding: 8px 12px; }
  .copy:hover { background: #20262f; }
  .msg { font-size: 13px; margin-top: 12px; min-height: 18px; }
  .msg.err { color: var(--err); }
  .msg.ok { color: var(--ok); }
  .found {
    margin-top: 14px; background: var(--soft); border: 1px solid var(--line);
    border-radius: 10px; padding: 12px 14px; display: flex; align-items: center; gap: 10px;
  }
  .found .fn { flex: 1; min-width: 0; font-size: 13px; word-break: break-all; }
  .found .meta { color: var(--muted); font-size: 12px; }
  footer { color: var(--muted); font-size: 12px; margin-top: 8px; text-align: center; }
  .dl-row { display: flex; gap: 8px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">🌙 Mooncell 文件投递</div>
    <div class="sub">内网临时文件中转 · 免登录 · 凭提取码取件</div>
  </header>

  <!-- 上传 -->
  <div class="card">
    <h2>上传文件</h2>
    <div class="zone" id="zone">
      <div class="ic">⬆️</div>
      <div class="t">点击选择文件,或拖拽到此处</div>
      <div class="h">单文件 ≤ 200 MB · 上传后获得提取码</div>
      <div class="fname" id="fname"></div>
      <input type="file" id="file" hidden />
    </div>
    <div class="row">
      <label class="fl">过期时间</label>
      <select id="expire">
        <option value="1">1 天后清理</option>
        <option value="7" selected>7 天后清理</option>
        <option value="30">30 天后清理</option>
      </select>
    </div>
    <div class="bar" id="bar" hidden><i id="barI"></i></div>
    <button class="full" id="up">上传并生成提取码</button>
    <div class="msg" id="upMsg"></div>
    <div class="res" id="res" hidden>
      <div class="k">提取码(凭此码下载)</div>
      <div class="code mono" id="resCode"></div>
      <div class="k">下载直链</div>
      <div class="link">
        <input class="mono" id="resLink" readonly />
        <button class="copy" id="copy">复制</button>
      </div>
    </div>
  </div>

  <!-- 下载 -->
  <div class="card">
    <h2>凭提取码下载</h2>
    <div class="dl-row">
      <input class="mono" id="code" placeholder="如 M3QP" maxlength="8" />
      <button id="dl">查找</button>
    </div>
    <div class="msg" id="dlMsg"></div>
    <div class="found" id="found" hidden>
      <div class="fn">
        <div id="foundName"></div>
        <div class="meta" id="foundMeta"></div>
      </div>
      <button id="foundDl">下载</button>
    </div>
  </div>

  <footer>仅本页可匿名投递;完整文件列表需登录控制台查看。</footer>
</div>

<script>
(function () {
  var $ = function (id) { return document.getElementById(id); };
  var file = null;

  // ---- 上传 ----
  var zone = $("zone");
  zone.onclick = function () { $("file").click(); };
  $("file").onchange = function (e) { pick(e.target.files[0]); };
  zone.ondragover = function (e) { e.preventDefault(); zone.classList.add("drag"); };
  zone.ondragleave = function () { zone.classList.remove("drag"); };
  zone.ondrop = function (e) { e.preventDefault(); zone.classList.remove("drag"); if (e.dataTransfer.files[0]) pick(e.dataTransfer.files[0]); };

  function pick(f) {
    file = f || null;
    $("fname").textContent = f ? (f.name + " · " + fmtSize(f.size)) : "";
  }
  function fmtSize(n) {
    if (n < 1024) return n + " B";
    if (n < 1048576) return (n / 1024).toFixed(1) + " KB";
    if (n < 1073741824) return (n / 1048576).toFixed(1) + " MB";
    return (n / 1073741824).toFixed(2) + " GB";
  }

  $("up").onclick = function () {
    if (!file) { setMsg("upMsg", "请先选择文件", true); return; }
    var fd = new FormData();
    fd.append("file", file);
    fd.append("expireDays", $("expire").value);

    var xhr = new XMLHttpRequest();
    xhr.open("POST", "/api/pub/cabinet");
    $("up").disabled = true;
    $("res").hidden = true;
    setMsg("upMsg", "上传中…", false);
    $("bar").hidden = false;
    xhr.upload.onprogress = function (e) {
      if (e.lengthComputable) $("barI").style.width = (e.loaded / e.total * 100) + "%";
    };
    xhr.onload = function () {
      $("up").disabled = false;
      $("bar").hidden = true;
      $("barI").style.width = "0";
      var r = {};
      try { r = JSON.parse(xhr.responseText); } catch (_) {}
      if (xhr.status === 200 && r.code) {
        setMsg("upMsg", "", false);
        $("resCode").textContent = r.code;
        $("resLink").value = location.origin + "/api/pubfile/" + r.code;
        $("res").hidden = false;
      } else {
        setMsg("upMsg", r.error || ("上传失败(" + xhr.status + ")"), true);
      }
    };
    xhr.onerror = function () {
      $("up").disabled = false; $("bar").hidden = true; $("barI").style.width = "0";
      // onerror = 传输层失败(非 HTTP 错误码)。最常见两因:反代请求体上限 / 文件超 200MB。
      setMsg("upMsg", "上传中断(传输层失败)。常见原因:① Console 前的反向代理限制了请求体大小——nginx 需设 client_max_body_size(如 200m)并 reload;② 文件超过 200MB 上限。可按 F12 看 Network 里该请求的状态进一步确认。", true);
    };
    xhr.send(fd);
  };

  $("copy").onclick = function () {
    var i = $("resLink");
    i.select();
    if (navigator.clipboard) navigator.clipboard.writeText(i.value);
    else document.execCommand("copy");
    $("copy").textContent = "已复制";
    setTimeout(function () { $("copy").textContent = "复制"; }, 1500);
  };

  // ---- 下载 ----
  $("dl").onclick = lookup;
  $("code").onkeydown = function (e) { if (e.key === "Enter") lookup(); };
  function lookup() {
    var c = $("code").value.trim();
    $("found").hidden = true;
    if (!c) { setMsg("dlMsg", "请输入提取码", true); return; }
    // 先查元数据(不下载文件体、不计下载数):有效则展示文件信息 + 下载按钮。
    setMsg("dlMsg", "查找中…", false);
    fetch("/api/pubfile/" + encodeURIComponent(c) + "/meta").then(function (resp) {
      return resp.json().then(function (j) { return { ok: resp.ok, j: j }; });
    }).then(function (r) {
      if (!r.ok) { setMsg("dlMsg", (r.j && r.j.error) || "提取码无效或文件已过期", true); return; }
      setMsg("dlMsg", "", false);
      $("foundName").textContent = r.j.name;
      $("foundMeta").textContent = fmtSize(r.j.size) + " · " + expireText(r.j.expires);
      $("foundDl").onclick = function () {
        var a = document.createElement("a");
        a.href = "/api/pubfile/" + encodeURIComponent(r.j.code);
        document.body.appendChild(a); a.click(); a.remove();
      };
      $("found").hidden = false;
    }).catch(function () { setMsg("dlMsg", "网络错误", true); });
  }
  function expireText(ms) {
    var d = ms - Date.now();
    if (d <= 0) return "已过期";
    var days = Math.ceil(d / 86400000);
    return days + " 天后过期";
  }

  function setMsg(id, text, isErr) {
    var el = $(id);
    el.textContent = text;
    el.className = "msg" + (text ? (isErr ? " err" : " ok") : "");
  }
})();
</script>
</body>
</html>
