name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  agent:
    name: Agent (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: agent/go.sum
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...

  console:
    name: Console (Go + 前端)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: console/pnpm-lock.yaml
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: console/go.sum
      - name: 构建前端(go:embed 需要 dist/)
        working-directory: console
        run: |
          pnpm install --frozen-lockfile
          pnpm build
      - name: Go build / vet / test
        working-directory: console
        run: |
          go build ./...
          go vet ./...
          go test ./...
